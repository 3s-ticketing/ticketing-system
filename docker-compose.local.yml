services:
  postgres:
    image: postgres:16
    container_name: ticketing-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_HOST_PORT:-15432}:5432"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      POSTGRES_DB: ${DB_NAME:-ticketing}
      POSTGRES_USER: ${DB_USERNAME:-ticketing}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-ticketing} -d ${DB_NAME:-ticketing}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keycloak:
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:

networks:
  ticketing-network:
    name: ticketing-network
