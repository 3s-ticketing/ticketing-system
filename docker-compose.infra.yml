services:
  # ==========================================
  #  Redis Master  (고정 IP: 172.28.0.10)
  # ==========================================
  redis-master:
    image: redis:7.2
    container_name: redis-master
    hostname: redis-master
    restart: always
    command: redis-server /usr/local/etc/redis/redis.conf
    volumes:
      - ./redis/master/redis.conf:/usr/local/etc/redis/redis.conf
      - redis-master-data:/data
    ports:
      - "6379:6379"
    networks:
      redis-net:
        ipv4_address: 172.28.0.10
      ticketing-network:
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==========================================
  #  Redis Replica 1 (고정 IP: 172.28.0.11)
  #  Redis Replica 2 (고정 IP: 172.28.0.12)
  # ==========================================
  redis-replica-1:
    image: redis:7.2
    container_name: redis-replica-1
    hostname: redis-replica-1
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    command: redis-server /usr/local/etc/redis/redis1.conf
    volumes:
      - ./redis/replica/redis1.conf:/usr/local/etc/redis/redis1.conf
      - redis-replica-1-data:/data
    ports:
      - "6380:6380"
    networks:
      redis-net:
        ipv4_address: 172.28.0.11
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6380", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  redis-replica-2:
    image: redis:7.2
    container_name: redis-replica-2
    hostname: redis-replica-2
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
    command: redis-server /usr/local/etc/redis/redis2.conf
    volumes:
      - ./redis/replica/redis2.conf:/usr/local/etc/redis/redis2.conf
      - redis-replica-2-data:/data
    ports:
      - "6381:6381"
    networks:
      redis-net:
        ipv4_address: 172.28.0.12
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "6381", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ==========================================
  #  Redis Sentinel 1 (고정 IP: 172.28.0.21)
  #  Redis Sentinel 2 (고정 IP: 172.28.0.22)
  #  Redis Sentinel 3 (고정 IP: 172.28.0.23)
  # ==========================================
  redis-sentinel-1:
    image: redis:7.2
    container_name: redis-sentinel-1
    hostname: redis-sentinel-1
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    command: >
      sh -c "cp /tmp/sentinel1.conf /data/sentinel1.conf &&
             redis-sentinel /data/sentinel1.conf"
    volumes:
      - ./redis/sentinel/sentinel1.conf:/tmp/sentinel1.conf:ro
      - sentinel1-data:/data
    ports:
      - "26379:26379"
    networks:
      redis-net:
        ipv4_address: 172.28.0.21
      ticketing-network:
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis-sentinel-2:
    image: redis:7.2
    container_name: redis-sentinel-2
    hostname: redis-sentinel-2
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    command: >
      sh -c "cp /tmp/sentinel2.conf /data/sentinel2.conf &&
             redis-sentinel /data/sentinel2.conf"
    volumes:
      - ./redis/sentinel/sentinel2.conf:/tmp/sentinel2.conf:ro
      - sentinel2-data:/data
    ports:
      - "26380:26379"
    networks:
      redis-net:
        ipv4_address: 172.28.0.22
      ticketing-network:
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  redis-sentinel-3:
    image: redis:7.2
    container_name: redis-sentinel-3
    hostname: redis-sentinel-3
    restart: always
    depends_on:
      redis-master:
        condition: service_healthy
      redis-replica-1:
        condition: service_healthy
      redis-replica-2:
        condition: service_healthy
    command: >
      sh -c "cp /tmp/sentinel3.conf /data/sentinel3.conf &&
             redis-sentinel /data/sentinel3.conf"
    volumes:
      - ./redis/sentinel/sentinel3.conf:/tmp/sentinel3.conf:ro
      - sentinel3-data:/data
    ports:
      - "26381:26379"
    networks:
      redis-net:
        ipv4_address: 172.28.0.23
      ticketing-network:
    healthcheck:
      test: [ "CMD", "redis-cli", "-p", "26379", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  kafka:
    image: apache/kafka:3.7.2
    container_name: ticketing-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_HOST_PORT:-19092}:19092"
    environment:
      TZ: Asia/Seoul
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:${KAFKA_HOST_PORT:-19092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_RETENTION_HOURS: 1
      KAFKA_LOG_RETENTION_BYTES: 1073741824
      KAFKA_LOG_SEGMENT_BYTES: 104857600
      KAFKA_HEAP_OPTS: "${KAFKA_HEAP_OPTS:--Xms256m -Xmx512m}"
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - ticketing-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 9092 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  keycloak:
    image: quay.io/keycloak/keycloak:26.0.0
    container_name: ticketing-keycloak
    restart: unless-stopped
    ports:
      - "${KEYCLOAK_HOST_PORT:-18080}:8080"
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT:-5432}/${KEYCLOAK_DB:-keycloak}
      KC_DB_USERNAME: ${DB_USERNAME}
      KC_DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?KEYCLOAK_ADMIN_PASSWORD is required}
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
      JAVA_OPTS_APPEND: "${KEYCLOAK_JAVA_OPTS_APPEND:--Xms256m -Xmx512m}"
    entrypoint: ["/bin/sh", "-c"]
    command: >
      /opt/keycloak/bin/kc.sh build --db=postgres --health-enabled=true --metrics-enabled=true &&
      exec /opt/keycloak/bin/kc.sh start-dev --import-realm
    volumes:
      - ./docker/keycloak/import:/opt/keycloak/data/import:ro
    networks:
      - ticketing-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  zipkin:
    profiles: ["monitoring"]
    image: openzipkin/zipkin:latest
    container_name: ticketing-zipkin
    restart: unless-stopped
    ports:
      - "${ZIPKIN_HOST_PORT:-9411}:9411"
    networks:
      - ticketing-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis-exporter:
    profiles: ["monitoring"]
    image: oliver006/redis_exporter:v1.67.0
    container_name: redis-exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: redis://redis:6379
    ports:
      - "9121:9121"
    networks:
      - ticketing-network
    depends_on:
      redis:
        condition: service_healthy

  kafka-exporter:
    profiles: ["monitoring"]
    image: danielqsj/kafka-exporter
    container_name: kafka-exporter
    restart: unless-stopped
    ports:
      - "9308:9308"
    command:
      - "--kafka.server=kafka:9092"
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - ticketing-network

  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
      - "--storage.tsdb.retention.time=1d"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    networks:
      - ticketing-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  loki:
    profiles: ["monitoring"]
    image: grafana/loki:latest
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/loki-config.yml
    volumes:
      - ./monitoring/loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki
    networks:
      - ticketing-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  promtail:
    profiles: ["monitoring"]
    image: grafana/promtail:latest
    container_name: promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/promtail-config.yml
    volumes:
      - ./monitoring/promtail/promtail-config.yml:/etc/promtail/promtail-config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
    networks:
      - ticketing-network
    depends_on:
      - loki
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:12.4.2
    container_name: grafana
    restart: unless-stopped
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_FEATURE_TOGGLES_ENABLE: traceqlEditor
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    networks:
      - ticketing-network
    depends_on:
      - prometheus
      - loki
      - zipkin
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  ticketing-network:
    name: ticketing-network
    driver: bridge
  redis-net:
    driver: bridge
    attachable: true
    name: redis-net
    ipam:
      config:
        - subnet: 172.28.0.0/24

volumes:
  redis-data:
  kafka-data:
  prometheus-data:
  loki-data:
  grafana-data:
  redis-master-data:
  redis-replica-1-data:
  redis-replica-2-data:
  sentinel1-data:
  sentinel2-data:
  sentinel3-data:
